# 사이트 설정 파일

# 테마 설정
theme: jekyll-theme-chirpy

# 웹페이지 언어 설정 › http://www.lingoes.net/en/translator/langcode.htm
# `_data/locales` 폴더에 같은 이름의 파일이 있으면 레이아웃 언어도 함께 변경됨
# 없으면 기본값 'en' 사용
lang: ko

# 시간대 설정 › https://zones.arilyn.cc
timezone: Asia/Seoul

# jekyll-seo-tag 설정 › https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
# ↓ --------------------------

title: Castle Bird # 사이트 메인 타이틀

tagline: 개발 기록을 남기는 공간 # 사이드바에 표시될 서브타이틀

description: >- # SEO 메타태그와 atom 피드에 사용됨
  개발 관련 기록을 남기는 공간입니다.

# 사이트의 프로토콜과 호스트명 입력
# 예: 'https://username.github.io' (끝에 '/' 붙이지 말 것)
url: "https://castle-bird.github.io"

github:
  username: castle-bird # 본인 GitHub 사용자명으로 변경

# twitter:
#   username: twitter_username # 본인 Twitter 사용자명으로 변경

social:
  # 본인 이름으로 변경
  # 게시글 기본 작성자 및 푸터 저작권 표시에 사용됨
  name: 박성조
  email: seongjo0501@gmail.com # 본인 이메일로 변경
  fediverse_handle: # 페디버스 핸들 입력. 예: "@username@domain.com"
  links:
    # 첫 번째 항목이 저작권 소유자 링크로 사용됨
    #- https://twitter.com/username # 본인 Twitter 주소로 변경
    - https://github.com/castle-bird # 본인 GitHub 주소로 변경
    # 아래 주석 해제하여 소셜 링크 추가 가능
    # - https://www.facebook.com/username
    # - https://www.linkedin.com/in/username

# 사이트 소유자 인증 설정
webmaster_verifications:
  google: # Google Search Console 인증 코드 입력
  bing: # Bing 웹마스터 인증 코드 입력
  alexa: # Alexa 인증 코드 입력
  yandex: # Yandex 인증 코드 입력
  baidu: # 바이두 인증 코드 입력
  facebook: # Facebook 인증 코드 입력

# ↑ --------------------------
# jekyll-seo-tag 설정 끝

# 웹 분석 설정
analytics:
  google:
    id: # Google Analytics ID 입력
  goatcounter:
    id: # GoatCounter ID 입력
  umami:
    id: # Umami ID 입력
    domain: # Umami 도메인 입력
  matomo:
    id: # Matomo ID 입력
    domain: # Matomo 도메인 입력
  cloudflare:
    id: # Cloudflare Web Analytics 토큰 입력
  fathom:
    id: # Fathom Site ID 입력

# 페이지뷰 설정
pageviews:
  provider: # 현재 'goatcounter'만 지원

# 기본 색상 테마 설정
#
# 참고: 비워두면 시스템 설정을 따르며,
# 사이드바 좌측 하단에 다크/라이트 모드 전환 버튼이 표시됨
#
# 선택 가능한 옵션:
#
#     light — 라이트 모드 고정
#     dark  — 다크 모드 고정
#
theme_mode: # [light | dark]

# 미디어 리소스용 CDN 엔드포인트
# 설정 시 '/'로 시작하는 모든 미디어 경로(아바타, 이미지, 오디오, 영상)에 CDN URL이 앞에 붙음
#
# 예: 'https://cdn.com'
cdn:

# 사이드바 아바타 이미지 (로컬 또는 외부 URL 사용 가능)
avatar: https://avatars.githubusercontent.com/u/167004937?s=400&u=ebeb99a982084cdf2664662ba497b4b00e5a3546&v=4

# SEO og:image 메타태그에 사용될 사이트 전체 소셜 미리보기 이미지 URL
# 게시글 front matter의 `page.image`로 개별 재정의 가능
social_preview_image: # 문자열, 로컬 또는 외부 URL

# 게시글 목차(TOC) 전역 표시 여부 (boolean)
toc: true

comments:
  # 댓글 시스템 전역 설정. 비워두면 비활성화
  provider: # [disqus | utterances | giscus]
  # 각 댓글 제공자 옵션
  disqus:
    shortname: # Disqus shortname 입력 › https://help.disqus.com/en/articles/1717111-what-s-a-shortname
  # utterances 설정 › https://utteranc.es/
  utterances:
    repo: # <깃허브사용자명>/<저장소명>
    issue_term: # < url | pathname | title | ...>
  # Giscus 설정 › https://giscus.app
  giscus:
    repo: # <깃허브사용자명>/<저장소명>
    repo_id:
    category:
    category_id:
    mapping: # 선택사항, 기본값 'pathname'
    strict: # 선택사항, 기본값 '0'
    input_position: # 선택사항, 기본값 'bottom'
    lang: # 선택사항, 기본값은 `site.lang` 값
    reactions_enabled: # 선택사항, 기본값 '1'

# 자체 호스팅 정적 파일 설정 (선택사항) › https://github.com/cotes2020/chirpy-static-assets
assets:
  self_host:
    enabled: # boolean, 비워두면 false
    # Jekyll 환경 지정, 비워두면 모든 환경에 적용
    # `assets.self_host.enabled`가 'true'일 때만 동작
    env: # [development | production]

pwa:
  enabled: true # PWA 기능 활성화 여부 (앱 설치 가능)
  cache:
    enabled: true # PWA 오프라인 캐시 활성화 여부
    # 아래 경로는 PWA 캐시에서 제외됨
    # 보통 같은 도메인을 공유하는 다른 사이트의 baseurl을 입력
    deny_paths:
      # - "/example"  # <SITE_URL>/example/* 패턴의 URL은 PWA 캐시에서 제외됨

paginate: 10 # 페이지당 게시글 수

# 사이트 기본 URL
baseurl: ""

# ------------ 아래 옵션은 수정하지 않는 것을 권장 ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts: # Rouge 옵션 › https://github.com/jneen/rouge#full-options
    css_class: highlight
    # default_lang: console
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: "" # 빈 문자열은 프로젝트 내 모든 파일을 의미
      type: posts
    values:
      layout: post
      comments: true # 게시글 댓글 활성화
      toc: true # 게시글 목차 표시
      # 아래 파라미터는 모든 게시글 링크 코드를 수정할 자신이 없으면 변경하지 말 것
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs # `site.collections` 참고
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
